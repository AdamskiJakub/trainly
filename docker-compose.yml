version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: trainly-db
    restart: always
    environment:
      POSTGRES_USER: trainly_user
      POSTGRES_PASSWORD: trainly_password
      POSTGRES_DB: trainly_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: trainly-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@trainly.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
